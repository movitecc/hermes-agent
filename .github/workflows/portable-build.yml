name: Build portable bundles

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  portable:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: HermesPortable-linux-x64.tar.gz
          - os: windows-latest
            target: windows-x64
            artifact: HermesPortable-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build portable bundle
        shell: bash
        run: |
          uv run --extra dev python packaging/portable/build.py --target "${{ matrix.target }}"

      - name: Smoke test launcher help
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          dist/portable/HermesPortable-linux-x64/hermes --help >/tmp/hermes-portable-help.txt
          head -20 /tmp/hermes-portable-help.txt

      - name: Smoke test launcher help
        if: matrix.target == 'windows-x64'
        shell: pwsh
        run: |
          & dist/portable/HermesPortable-windows-x64/hermes.ps1 --help | Select-Object -First 20

      - name: Upload portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/portable/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: portable
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hermes Portable ${{ github.ref_name }}"
          body: |
            ## Hermes Portable ${{ github.ref_name }}

            Self-contained portable bundles — no Python or uv installation required.
            Unpack and run.

            ### Linux x64
            ```bash
            tar xzf HermesPortable-linux-x64.tar.gz
            ./HermesPortable-linux-x64/hermes --help
            ```

            ### Windows x64
            ```powershell
            Expand-Archive HermesPortable-windows-x64.zip
            .\HermesPortable-windows-x64\hermes.ps1 --help
            ```

            First run: `hermes setup` to add your API keys.
            State lives under `data/hermes-home/` inside the portable directory.
          files: |
            dist/release/**/*.tar.gz
            dist/release/**/*.zip
          draft: false
          prerelease: true
